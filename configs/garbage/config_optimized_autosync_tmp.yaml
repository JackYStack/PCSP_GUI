data:
  data_path: Dataset/data.csv
  train_size: 0.8
  val_size: 0.0
  test_size: 0.2
  random_state: 42
  stratify:
    enabled: true
    target: CapacityComposite
    strategy: quantile
    n_bins: 10
    min_per_bin: 2
features:
  input_features:
  - InsulationThickness
  - Width
  - LeafThickness
  - ConcreteStrength
  - x1
  - RebarRatio
  - RebarArea
  - fc*Width
  - S
  - ConnectorStiffness
  - ConnectorCapacity
  target_features:
  - StiffnessComposite
  - CapacityComposite
evaluation:
  eval_per_output: true
cross_validation:
  n_splits: 5
  n_repeats: 3
  random_state: 42
parallel:
  n_jobs_model: 4
  n_jobs_cv: 5
preprocessing:
  scaling:
    mode: both
    whitelist_models:
    - SVR
    - MLP
    - GPR
    - ANN
    - RNN
    - CNN1D
    - TabNet
    blacklist_models:
    - RandomForest
    - DecisionTree
    - ExtraTrees
    - GBRT
    - XGB
    - LightGBM
    - CatBoost
    - Stacking
    default: false
models:
  svr:
    name: SVR
    enabled: false
    params:
      kernel: rbf
      C: 10.0
      epsilon: 0.01
      gamma: scale
    stacking_params:
      kernel: rbf
      C: 5.0
      epsilon: 0.02
      gamma: scale
  random_forest:
    name: RandomForest
    enabled: true
    params:
      n_estimators: 150
      random_state: 42
      n_jobs: -1
      max_depth: 30
      min_samples_split: 2
      min_samples_leaf: 1
      max_features: sqrt
  decision_tree:
    name: DecisionTree
    enabled: true
    params:
      criterion: squared_error
      splitter: best
      max_depth: 17
      min_samples_split: 9
      min_samples_leaf: 4
      random_state: 42
  extra_trees:
    name: ExtraTrees
    enabled: true
    params:
      n_estimators: 340
      random_state: 42
      n_jobs: -1
      max_features: log2
      max_depth: 36
      min_samples_split: 3
      min_samples_leaf: 2
  xgboost:
    name: XGB
    enabled: true
    params:
      n_estimators: 100
      random_state: 42
      n_jobs: -1
      subsample: 0.6566897834790801
      colsample_bytree: 0.5644086077303978
      colsample_bylevel: 1.0
      colsample_bynode: 1.0
      objective: reg:squarederror
      tree_method: hist
      max_depth: 8
      learning_rate: 0.03155652841671602
      gamma: 0.05763457552686568
      reg_alpha: 1.0293710461599405e-05
      reg_lambda: 0.020611678596581334
    stacking_params:
      n_estimators: 200
      random_state: 42
      n_jobs: 4
      subsample: 0.8
      colsample_bytree: 0.8
      objective: reg:squarederror
      tree_method: hist
      max_depth: 4
      learning_rate: 0.1
      gamma: 0.0
      reg_alpha: 0.0
      reg_lambda: 1.0
  gbrt:
    name: GBRT
    enabled: true
    params:
      n_estimators: 275
      learning_rate: 0.03900910488066194
      max_depth: 2
      subsample: 0.8686127716071746
      random_state: 42
      min_samples_leaf: 1
      min_samples_split: 6
  lightgbm:
    name: LightGBM
    enabled: true
    params:
      n_estimators: 400
      random_state: 42
      n_jobs: -1
      learning_rate: 0.19718532523045834
      num_leaves: 183
      max_depth: 8
      min_child_samples: 46
      subsample: 0.941704929665477
      colsample_bytree: 0.5400691458897271
      verbose: -1
      reg_alpha: 3.7029857138078195e-08
      reg_lambda: 0.30019140995355137
    stacking_params:
      n_estimators: 150
      random_state: 42
      n_jobs: 4
      learning_rate: 0.1
      num_leaves: 64
      max_depth: 8
      min_child_samples: 15
      subsample: 0.9
      colsample_bytree: 0.8
      verbose: -1
      reg_alpha: 0.0
      reg_lambda: 1.0
  catboost:
    name: CatBoost
    enabled: true
    params:
      iterations: 550
      random_state: 42
      learning_rate: 0.027010527749605478
      depth: 4
      l2_leaf_reg: 2.324672848950434
      verbose: false
      thread_count: 4
      border_count: 128
    stacking_params:
      iterations: 180
      random_state: 42
      learning_rate: 0.15
      depth: 4
      l2_leaf_reg: 2.0
      verbose: false
      thread_count: 4
      border_count: 64
  gpr:
    name: GPR
    enabled: false
    params:
      kernel: null
      alpha: 1.0e-12
      normalize_y: true
      n_restarts_optimizer: 2
      random_state: 42
  kriging:
    name: Kriging
    enabled: false
    params:
      method: ordinary
      variogram_model: spherical
      nlags: 6
      weight: false
      n_closest_points: 10
      transform_strategy: pca
      n_components: 2
      scale: true
    transform:
      transform_strategy: pca
      n_components: 2
      scale: true
      pca_kwargs:
        random_state: 42
  mlp:
    name: MLP
    enabled: false
    params:
      hidden_layer_sizes:
      - 128
      - 64
      activation: relu
      alpha: 0.0001
      learning_rate_init: 0.001
      max_iter: 2000
      early_stopping: true
      random_state: 42
      batch_size: auto
  ann:
    name: ANN
    enabled: true
    params:
      epochs: 200
      batch_size: 32
      learning_rate: 0.0005213360402407274
      weight_decay: 1.0e-05
      hidden_units:
      - 128
      - 64
      dropout: 0.08377439080781929
      activation: relu
      patience: 25
      val_fraction: 0.15
      random_state: 42
  rnn:
    name: RNN
    enabled: false
    params:
      epochs: 200
      batch_size: 64
      learning_rate: 0.001
      weight_decay: 1.0e-05
      hidden_size: 128
      num_layers: 2
      dropout: 0.1
      bidirectional: false
      rnn_type: lstm
      patience: 25
      val_fraction: 0.15
      random_state: 42
  cnn1d:
    name: CNN1D
    enabled: false
    params:
      epochs: 200
      batch_size: 64
      learning_rate: 0.001
      weight_decay: 0.0001
      conv_channels:
      - 32
      - 64
      kernel_size: 3
      hidden_dim: 128
      dropout: 0.2
      patience: 20
      val_fraction: 0.15
      random_state: 42
  tabnet:
    name: TabNet
    enabled: false
    params:
      n_d: 16
      n_a: 16
      n_steps: 4
      gamma: 1.5
      lambda_sparse: 0.0001
      learning_rate: 0.002
      weight_decay: 5.0e-05
      momentum: 0.02
      n_independent: 2
      n_shared: 2
      epochs: 200
      batch_size: 512
      virtual_batch_size: 128
      patience: 30
      eval_fraction: 0.2
      random_state: 42
  stacking:
    name: Stacking
    enabled: true
    base_models:
    - XGB
    - ANN
    meta_model: ANN
    params:
      cv: 3
      passthrough: true
      n_jobs: -1
hyperparameter_optimization:
  enabled: true
  n_trials: 200
  timeout: null
  n_jobs: 12
  cv_folds: 5
  study_name: tuning
  direction: maximize
  metric: r2
  model_metrics:
    RandomForest: r2
    DecisionTree: r2
    ExtraTrees: r2
    SVR: r2
    MLP: r2
    ANN: r2
    RNN: r2
    XGB: r2
    GBRT: r2
    LightGBM: r2
    CatBoost: r2
    CNN1D: r2
    GPR: r2
    Kriging: r2
    TabNet: r2
    Stacking: r2
  model_directions:
    RandomForest: maximize
    DecisionTree: maximize
    ExtraTrees: maximize
    SVR: maximize
    MLP: maximize
    ANN: maximize
    RNN: maximize
    XGB: maximize
    GBRT: maximize
    LightGBM: maximize
    CatBoost: maximize
    CNN1D: maximize
    GPR: maximize
    Kriging: maximize
    TabNet: maximize
    Stacking: maximize
  model_cv_folds:
    Stacking: cv_folds
  model_n_trials:
    Stacking: n_trials
  model_timeouts:
    Stacking: 21600
  model_n_jobs:
    Stacking: 1
    CatBoost: 1
  directions:
    default:
    - minimize
    - minimize
    per_model: {}
  sampler:
    type: motpe
    params:
      seed: 42
      multivariate: true
      group: true
  save_study: true
  optimize_models:
  - RandomForest
  - DecisionTree
  - ExtraTrees
  - ANN
  - XGB
  - GBRT
  - LightGBM
  - CatBoost
  - Stacking
  search_spaces:
    RandomForest:
      n_estimators:
        type: int
        low: 100
        high: 400
        step: 50
      max_depth:
        type: int
        low: 5
        high: 40
        step: 1
      min_samples_split:
        type: int
        low: 2
        high: 10
        step: 1
      min_samples_leaf:
        type: int
        low: 1
        high: 4
        step: 1
      max_features:
        choices:
        - sqrt
        - log2
    DecisionTree:
      max_depth:
        type: int
        low: 3
        high: 30
        step: 1
      min_samples_split:
        type: int
        low: 2
        high: 10
        step: 1
      min_samples_leaf:
        type: int
        low: 1
        high: 5
        step: 1
    GBRT:
      n_estimators:
        type: int
        low: 100
        high: 500
        step: 25
      learning_rate:
        type: float
        low: 0.01
        high: 0.2
        log: false
      max_depth:
        type: int
        low: 2
        high: 6
        step: 1
      subsample:
        type: float
        low: 0.6
        high: 1.0
      min_samples_split:
        type: int
        low: 2
        high: 6
      min_samples_leaf:
        type: int
        low: 1
        high: 4
    ExtraTrees:
      n_estimators:
        type: int
        low: 100
        high: 500
        step: 20
      max_depth:
        type: int
        low: 5
        high: 40
        step: 1
      min_samples_split:
        type: int
        low: 2
        high: 10
        step: 1
      min_samples_leaf:
        type: int
        low: 1
        high: 4
        step: 1
      max_features:
        choices:
        - sqrt
        - log2
    SVR:
      C:
        type: float
        low: 0.01
        high: 100.0
        log: true
      epsilon:
        type: float
        low: 0.001
        high: 0.1
        log: true
      gamma:
        choices:
        - scale
        - auto
      kernel:
        choices:
        - rbf
        - linear
    MLP:
      hidden_layer_sizes:
        choices:
        - - 64
        - - 128
        - - 64
          - 32
        - - 128
          - 64
        - - 128
          - 64
          - 32
        - - 256
          - 128
      activation:
        choices:
        - relu
        - tanh
      alpha:
        type: float
        low: 1.0e-05
        high: 0.01
        log: true
      learning_rate_init:
        type: float
        low: 0.0001
        high: 0.01
        log: true
      batch_size:
        type: int
        low: 32
        high: 256
        step: 32
    ANN:
      hidden_units:
        choices:
