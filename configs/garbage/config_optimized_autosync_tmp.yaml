      learning_rate:
        type: float
        low: 0.0005
        high: 0.005
        log: true
      dropout:
        type: float
        low: 0.0
        high: 0.4
      batch_size:
        type: int
        low: 32
        high: 128
        step: 32
    RNN:
      hidden_size:
        type: int
        low: 64
        high: 256
        step: 32
      num_layers:
        type: int
        low: 1
        high: 4
        step: 1
      dropout:
        type: float
        low: 0.0
        high: 0.4
      learning_rate:
        type: float
        low: 0.0005
        high: 0.005
        log: true
      batch_size:
        type: int
        low: 32
        high: 128
        step: 32
    XGB:
      n_estimators:
        type: int
        low: 100
        high: 600
        step: 50
      max_depth:
        type: int
        low: 3
        high: 9
        step: 1
      learning_rate:
        type: float
        low: 0.01
        high: 0.3
        log: true
      subsample:
        type: float
        low: 0.5
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.5
        high: 1.0
      gamma:
        type: float
        low: 0.0
        high: 0.5
      reg_alpha:
        type: float
        low: 1.0e-08
        high: 1.0
        log: true
      reg_lambda:
        type: float
