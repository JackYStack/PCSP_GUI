data:
  data_path: Dataset/data.csv
  train_size: 0.6
  val_size: 0.2
  test_size: 0.2
  random_state: 42
features:
  input_features:
  - InsulationThickness
  - Width
  - TotalThickness
  - LeafThickness
  - ConcreteStrength
  - RebarRatio
  - RebarArea
  - S
  - n
  - ConnectorStiffness
  - ConnectorCapacity
  target_features:
  - StiffnessComposite
  - CapacityComposite
evaluation:
  eval_per_output: true
cross_validation:
  n_splits: 5
  n_repeats: 3
  random_state: 42
parallel:
  n_jobs_model: 4
  n_jobs_cv: 5
models:
  svr:
    name: SVR
    enabled: true
    params:
      kernel: rbf
      C: 0.32822847282567413
      epsilon: 0.0010146195989310563
      gamma: scale
    stacking_params:
      kernel: rbf
      C: 5.0
      epsilon: 0.02
      gamma: scale
  random_forest:
    name: RandomForest
    enabled: true
    params:
      n_estimators: 400
      random_state: 42
      n_jobs: -1
      max_depth: 14
      min_samples_split: 2
      min_samples_leaf: 1
      max_features: sqrt
  extra_trees:
    name: ExtraTrees
    enabled: true
    params:
      n_estimators: 140
      random_state: 42
      n_jobs: -1
      max_features: sqrt
      max_depth: 29
      min_samples_split: 2
      min_samples_leaf: 1
  xgboost:
    name: XGB
    enabled: true
    params:
      n_estimators: 600
      random_state: 42
      n_jobs: -1
      subsample: 0.6977406242975651
      colsample_bytree: 0.8674979865414278
      colsample_bylevel: 1.0
      colsample_bynode: 1.0
      objective: reg:squarederror
      tree_method: hist
      max_depth: 4
      learning_rate: 0.07198971450488639
      gamma: 0.0012515907498993652
      reg_alpha: 0.002241078624082825
      reg_lambda: 0.5669660887965878
    stacking_params:
      n_estimators: 200
      random_state: 42
      n_jobs: 4
      subsample: 0.8
      colsample_bytree: 0.8
      objective: reg:squarederror
      tree_method: hist
      max_depth: 4
      learning_rate: 0.1
      gamma: 0.0
      reg_alpha: 0.0
      reg_lambda: 1.0
  lightgbm:
    name: LightGBM
    enabled: true
    params:
      n_estimators: 300
      random_state: 42
      n_jobs: -1
      learning_rate: 0.16174144200345195
      num_leaves: 223
      max_depth: 12
      min_child_samples: 6
      subsample: 0.9581474763721458
      colsample_bytree: 0.9194267663271039
      verbose: -1
      reg_alpha: 3.0474430470187328e-06
      reg_lambda: 9.517520266710568
    stacking_params:
      n_estimators: 150
      random_state: 42
      n_jobs: 4
      learning_rate: 0.1
      num_leaves: 64
      max_depth: 8
      min_child_samples: 15
      subsample: 0.9
      colsample_bytree: 0.8
      verbose: -1
      reg_alpha: 0.0
      reg_lambda: 1.0
  catboost:
    name: CatBoost
    enabled: true
    params:
      iterations: 200
      random_state: 42
      learning_rate: 0.12625681175097195
      depth: 4
      l2_leaf_reg: 1.984827933508462
      verbose: false
      thread_count: -1
      border_count: 112
    stacking_params:
      iterations: 180
      random_state: 42
      learning_rate: 0.15
      depth: 4
      l2_leaf_reg: 2.0
      verbose: false
      thread_count: 4
      border_count: 64
  gpr:
    name: GPR
    enabled: true
    params:
      kernel: null
      alpha: 1.0014880770451319e-12
      normalize_y: true
      n_restarts_optimizer: 3
      random_state: 42
  kriging:
    name: Kriging
    enabled: false
    params:
      method: universal
      variogram_model: exponential
      nlags: 9
      weight: false
      n_closest_points: 10
      transform_strategy: pca
      n_components: 2
      scale: false
    transform:
      transform_strategy: pca
      n_components: 2
      scale: true
      pca_kwargs:
        random_state: 42
  mlp:
    name: MLP
    enabled: true
    params:
      hidden_layer_sizes:
      - 128
      - 64
      - 32
      activation: relu
      alpha: 0.003793792827913784
      learning_rate_init: 0.008757978469946484
      max_iter: 2000
      early_stopping: true
      random_state: 42
      batch_size: 96
  cnn1d:
    name: CNN1D
    enabled: true
    params:
      epochs: 200
      batch_size: 32
      learning_rate: 0.0015499272098669877
      weight_decay: 0.0006662182990862769
      conv_channels:
      - 32
      - 64
      kernel_size: 3
      hidden_dim: 192
      dropout: 0.07006185385442426
      patience: 20
      val_fraction: 0.15
      random_state: 42
  tabnet:
    name: TabNet
    enabled: false
    params:
      n_d: 8
      n_a: 16
      n_steps: 6
      gamma: 1.2902459876975416
      lambda_sparse: 5.553200603584521e-06
      learning_rate: 0.00462471431414016
      weight_decay: 0.0003710745453434942
      momentum: 0.02
      n_independent: 2
      n_shared: 2
      epochs: 200
      batch_size: 832
      virtual_batch_size: 96
      patience: 30
      eval_fraction: 0.2
      random_state: 42
  stacking:
    name: Stacking
    enabled: true
    base_models:
    - SVR
    - LightGBM
    - CatBoost
    - XGB
    meta_model: SVR
    params:
      cv: 2
      passthrough: false
      n_jobs: 1
hyperparameter_optimization:
  enabled: true
  n_trials: 200
  timeout: null
  n_jobs: 12
  cv_folds: 5
  study_name: tuning
  direction: maximize
  metric: r2
  model_metrics:
    RandomForest: r2
    ExtraTrees: r2
    SVR: r2
    MLP: r2
    XGB: r2
    LightGBM: r2
    CatBoost: r2
    CNN1D: r2
    GPR: r2
    Kriging: r2
    TabNet: r2
    Stacking: r2
  model_directions:
    RandomForest: maximize
    ExtraTrees: maximize
    SVR: maximize
    MLP: maximize
    XGB: maximize
    LightGBM: maximize
    CatBoost: maximize
    CNN1D: maximize
    GPR: maximize
    Kriging: maximize
    TabNet: maximize
    Stacking: maximize
  model_cv_folds:
    Stacking: 2
  model_n_trials:
    Stacking: 60
  model_timeouts:
    Stacking: 21600
  model_n_jobs:
    Stacking: 1
  directions:
    default:
    - minimize
    - minimize
    per_model: {}
  sampler:
    type: motpe
    params:
      seed: 42
      multivariate: true
      group: true
  save_study: true
  optimize_models:
  - RandomForest
  - ExtraTrees
  - SVR
  - MLP
  - XGB
  - LightGBM
  - CatBoost
  - CNN1D
  - GPR
  - Kriging
  - TabNet
  - Stacking
  search_spaces:
    RandomForest:
      n_estimators:
        type: int
        low: 100
        high: 400
        step: 50
      max_depth:
        type: int
        low: 5
        high: 40
        step: 1
      min_samples_split:
        type: int
        low: 2
        high: 10
        step: 1
      min_samples_leaf:
        type: int
        low: 1
        high: 4
        step: 1
      max_features:
        choices:
        - sqrt
        - log2
    ExtraTrees:
      n_estimators:
        type: int
        low: 100
        high: 500
        step: 20
      max_depth:
        type: int
        low: 5
        high: 40
        step: 1
      min_samples_split:
        type: int
        low: 2
        high: 10
        step: 1
      min_samples_leaf:
        type: int
        low: 1
        high: 4
        step: 1
      max_features:
        choices:
        - sqrt
        - log2
    SVR:
      C:
        type: float
        low: 0.01
        high: 100.0
        log: true
      epsilon:
        type: float
        low: 0.001
        high: 0.1
        log: true
      gamma:
        choices:
        - scale
        - auto
      kernel:
        choices:
        - rbf
        - linear
    MLP:
      hidden_layer_sizes:
        choices:
        - - 64
        - - 128
        - - 64
          - 32
        - - 128
          - 64
        - - 128
          - 64
          - 32
        - - 256
          - 128
      activation:
        choices:
        - relu
        - tanh
      alpha:
        type: float
        low: 1.0e-05
        high: 0.01
        log: true
      learning_rate_init:
        type: float
        low: 0.0001
        high: 0.01
        log: true
      batch_size:
        type: int
        low: 32
        high: 256
        step: 32
    XGB:
      n_estimators:
        type: int
        low: 100
        high: 600
        step: 50
      max_depth:
        type: int
        low: 3
        high: 9
        step: 1
      learning_rate:
        type: float
        low: 0.01
        high: 0.3
        log: true
      subsample:
        type: float
        low: 0.5
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.5
        high: 1.0
      gamma:
        type: float
        low: 0.0
        high: 0.5
      reg_alpha:
        type: float
        low: 1.0e-08
        high: 1.0
        log: true
      reg_lambda:
        type: float
        low: 0.001
        high: 10.0
        log: true
    LightGBM:
      n_estimators:
        type: int
        low: 100
        high: 600
        step: 50
      num_leaves:
        type: int
        low: 31
        high: 255
        step: 8
      max_depth:
        type: int
        low: 3
        high: 12
        step: 1
      learning_rate:
        type: float
        low: 0.005
        high: 0.2
        log: true
      min_child_samples:
        type: int
        low: 5
        high: 50
        step: 1
      subsample:
        type: float
        low: 0.5
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.5
        high: 1.0
      reg_alpha:
        type: float
        low: 1.0e-08
        high: 1.0
        log: true
      reg_lambda:
        type: float
        low: 0.0001
        high: 10.0
        log: true
    CatBoost:
      iterations:
        type: int
        low: 200
        high: 800
        step: 50
      depth:
        type: int
        low: 4
        high: 10
        step: 1
      learning_rate:
        type: float
        low: 0.01
        high: 0.3
        log: true
      l2_leaf_reg:
        type: float
        low: 1.0
        high: 10.0
        log: true
      border_count:
        type: int
        low: 32
        high: 255
        step: 16
    CNN1D:
      conv_channels:
        choices:
        - - 32
          - 64
        - - 64
          - 64
        - - 64
          - 128
      kernel_size:
        type: int
        low: 3
        high: 7
        step: 2
      hidden_dim:
        type: int
        low: 64
        high: 256
        step: 32
      dropout:
        type: float
        low: 0.05
        high: 0.5
      learning_rate:
        type: float
        low: 0.0003
        high: 0.003
        log: true
      weight_decay:
        type: float
        low: 1.0e-05
        high: 0.001
        log: true
      batch_size:
        type: int
        low: 32
        high: 128
        step: 32
      epochs: 200
      patience: 20
    TabNet:
      n_d:
        type: int
        low: 8
        high: 32
        step: 2
      n_steps:
        type: int
        low: 3
        high: 6
        step: 1
      gamma:
        type: float
        low: 1.0
        high: 2.5
      lambda_sparse:
        type: float
        low: 1.0e-06
        high: 0.001
        log: true
      learning_rate:
        type: float
        low: 0.0005
        high: 0.005
        log: true
      weight_decay:
        type: float
        low: 1.0e-06
        high: 0.001
        log: true
      batch_size:
        type: int
        low: 256
        high: 1024
        step: 64
      virtual_batch_size:
        type: int
        low: 64
        high: 256
        step: 32
      patience: 30
      epochs: 200
    Stacking:
      base_models:
        choices:
        - - SVR
          - LightGBM
        - - LightGBM
          - XGB
        - - LightGBM
          - CatBoost
      meta_model:
        choices:
        - SVR
        - LightGBM
      cv:
        value: 2
      passthrough:
        choices:
        - true
        - false
      n_jobs:
        choices:
        - 1
        - 2
    GPR:
      alpha:
        type: float
        low: 1.0e-12
        high: 1.0e-06
        log: true
      normalize_y:
        choices:
        - true
        - false
      n_restarts_optimizer:
        type: int
        low: 0
        high: 5
        step: 1
    Kriging:
      method:
        choices:
        - ordinary
        - universal
      variogram_model:
        choices:
        - spherical
        - exponential
        - gaussian
        - linear
      nlags:
        type: int
        low: 4
        high: 12
        step: 1
      weight:
        choices:
        - true
        - false
      transform:
        n_components:
          type: int
          low: 2
          high: 4
          step: 1
        scale:
          choices:
          - true
          - false
shap:
  enabled: false
  sample_size: 200
output:
  models_dir: models
  plots_dir: plots
  evaluation_dir: evaluation
  predictions_dir: predictions
  shap_dir: shap_values
  results_dir: results
  optuna_dir: optuna_studies
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: logs/training.log
